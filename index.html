<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Source Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(138, 43, 226, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(0, 191, 255, 0.2) 0%, transparent 50%);
            animation: gradientMove 15s ease infinite;
            z-index: 0;
        }

        @keyframes gradientMove {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5%, 5%) rotate(120deg); }
            66% { transform: translate(-5%, 5%) rotate(240deg); }
        }

        .container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 
                0 8px 32px 0 rgba(0, 0, 0, 0.37),
                inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 1100px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.2) 0%, rgba(138, 43, 226, 0.2) 100%);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #b8b8ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-weight: 400;
        }

        .input-section {
            padding: 30px 40px;
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(138, 43, 226, 0.5);
            box-shadow: 0 0 0 3px rgba(138, 43, 226, 0.1);
        }

        .btn {
            padding: 16px 28px;
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.3) 0%, rgba(138, 43, 226, 0.3) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            white-space: nowrap;
        }

        .btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.5) 0%, rgba(138, 43, 226, 0.5) 100%);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(138, 43, 226, 0.3);
        }

        .btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .option-btn {
            padding: 10px 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
        }

        .option-btn.active {
            background: linear-gradient(135deg, rgba(120, 119, 198, 0.4) 0%, rgba(138, 43, 226, 0.4) 100%);
            border-color: rgba(138, 43, 226, 0.5);
            color: #fff;
        }

        .output-section {
            padding: 30px 40px;
            max-height: 600px;
            overflow-y: auto;
            position: relative;
        }

        .output-section::-webkit-scrollbar {
            width: 8px;
        }

        .output-section::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .output-section::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        .output-section::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            flex-wrap: wrap;
            gap: 10px;
        }

        .code-title {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 600;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .copy-btn-top, .download-btn {
            padding: 8px 16px;
            border: 1px solid rgba(40, 167, 69, 0.3);
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .copy-btn-top {
            background: rgba(40, 167, 69, 0.2);
            color: #4ade80;
        }

        .copy-btn-top:hover {
            background: rgba(40, 167, 69, 0.3);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
            transform: translateY(-1px);
        }

        .download-btn {
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        .download-btn:hover {
            background: rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
            transform: translateY(-1px);
        }

        .copy-btn-top.copied, .download-btn.downloaded {
            background: rgba(40, 167, 69, 0.4);
            border-color: rgba(40, 167, 69, 0.5);
        }

        .code-container {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            overflow-x: auto;
        }

        .code-container::-webkit-scrollbar {
            height: 8px;
        }

        .code-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }

        .code-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }

        pre {
            margin: 0;
            color: #e0e0e0;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid rgba(138, 43, 226, 0.8);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(255, 255, 255, 0.4);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
            stroke: currentColor;
        }

        .status {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 10px;
            text-align: center;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
        }

        .stat-value {
            display: block;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .stat-label {
            display: block;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 768px) {
            .input-group {
                flex-direction: column;
            }
            
            .stats {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Source Viewer</h1>
            <p>Advanced HTML/CSS/Image extraction tool with liquid glass UI</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="urlInput" 
                    placeholder="https://example.com"
                    autocomplete="url"
                >
                <button class="btn" id="fetchBtn" onclick="fetchHTML()">Extract Code</button>
            </div>

            <div class="options">
                <button class="option-btn active" data-type="full" onclick="selectType('full')">Full HTML (All Embedded)</button>
                <button class="option-btn" data-type="html" onclick="selectType('html')">HTML Only</button>
                <button class="option-btn" data-type="css" onclick="selectType('css')">CSS Only</button>
                <button class="option-btn" data-type="js" onclick="selectType('js')">JavaScript</button>
                <button class="option-btn" data-type="text" onclick="selectType('text')">Text Content</button>
                <button class="option-btn" data-type="raw" onclick="selectType('raw')">Raw Source</button>
            </div>

            <div class="status" id="status"></div>
        </div>

        <div class="output-section" id="output">
            <div class="empty-state">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path>
                </svg>
                <p>Enter a URL and select extraction type to begin</p>
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const output = document.getElementById('output');
        const status = document.getElementById('status');
        
        let currentType = 'full';
        let fullHtmlContent = '';
        let embeddedHtmlContent = '';
        let htmlStats = { size: 0, lines: 0, chars: 0 };
        let currentUrl = '';
        let currentProxyIndex = 0;

        const corsProxies = [
            url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
            url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
            url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
            url => `https://thingproxy.freeboard.io/fetch/${url}`
        ];

        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchHTML();
        });

        function selectType(type) {
            currentType = type;
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            if (fullHtmlContent) {
                processAndDisplay(fullHtmlContent, type);
            }
        }

        async function fetchHTML() {
            let url = urlInput.value.trim();
            
            if (!url) {
                showError('Please enter a URL');
                return;
            }

            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }

            try {
                new URL(url);
            } catch {
                showError('Please enter a valid URL');
                return;
            }

            currentUrl = url;
            showLoading();
            fetchBtn.disabled = true;
            status.textContent = '';

            for (let i = 0; i < corsProxies.length; i++) {
                try {
                    status.textContent = `⚡ Attempting method ${i + 1}/${corsProxies.length}...`;
                    currentProxyIndex = i;
                    
                    const proxyUrl = corsProxies[i](url);
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);
                    
                    const response = await fetch(proxyUrl, {
                        signal: controller.signal,
                        headers: {
                            'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
                        }
                    });
                    
                    clearTimeout(timeoutId);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    const html = await response.text();
                    
                    if (!html || html.length < 10) {
                        throw new Error('Empty response');
                    }
                    
                    fullHtmlContent = html;
                    
                    htmlStats.size = (new Blob([html]).size / 1024).toFixed(2);
                    htmlStats.lines = html.split('\n').length;
                    htmlStats.chars = html.length;
                    
                    status.textContent = `✓ Successfully extracted using method ${i + 1}`;
                    
                    await processAndDisplay(html, currentType);
                    
                    fetchBtn.disabled = false;
                    return;
                    
                } catch (error) {
                    console.log(`Proxy ${i + 1} failed:`, error.message);
                    if (i === corsProxies.length - 1) {
                        showError('Unable to fetch this website. The site may be blocking requests or is down.');
                        status.textContent = '✗ All extraction methods failed';
                    }
                }
            }
            
            fetchBtn.disabled = false;
        }

        async function fetchResource(url) {
            const proxyUrl = corsProxies[currentProxyIndex](url);
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    return await response.text();
                }
            } catch (e) {
                console.log('Failed to fetch resource:', url);
            }
            return null;
        }

        async function fetchImageAsBase64(url) {
            const proxyUrl = corsProxies[currentProxyIndex](url);
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 10000);
                
                const response = await fetch(proxyUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                if (response.ok) {
                    const blob = await response.blob();
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.onerror = reject;
                        reader.readAsDataURL(blob);
                    });
                }
            } catch (e) {
                console.log('Failed to fetch image:', url);
            }
            return null;
        }

        async function embedExternalResources(html, baseUrl) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            const urlObj = new URL(baseUrl);
            const baseUrlOrigin = urlObj.origin;

            function resolveUrl(url) {
                if (!url) return null;
                if (url.startsWith('data:')) return null;
                if (url.startsWith('http://') || url.startsWith('https://')) {
                    return url;
                }
                if (url.startsWith('//')) {
                    return urlObj.protocol + url;
                }
                if (url.startsWith('/')) {
                    return baseUrlOrigin + url;
                }
                try {
                    return new URL(url, baseUrl).href;
                } catch {
                    return null;
                }
            }

            // Embed external CSS
            const linkElements = Array.from(doc.querySelectorAll('link[rel="stylesheet"]'));
            let cssCount = 0;
            
            for (let link of linkElements) {
                const href = link.getAttribute('href');
                const cssUrl = resolveUrl(href);
                
                if (cssUrl) {
                    status.textContent = `⚡ Fetching CSS ${++cssCount}/${linkElements.length}...`;
                    const cssContent = await fetchResource(cssUrl);
                    
                    if (cssContent) {
                        const styleElement = doc.createElement('style');
                        styleElement.setAttribute('data-original-href', href);
                        styleElement.textContent = `\n/* Embedded from: ${href} */\n${cssContent}\n`;
                        link.parentNode.replaceChild(styleElement, link);
                    }
                }
            }

            // Embed external JS
            const scriptElements = Array.from(doc.querySelectorAll('script[src]'));
            let jsCount = 0;
            
            for (let script of scriptElements) {
                const src = script.getAttribute('src');
                const jsUrl = resolveUrl(src);
                
                if (jsUrl && !src.includes('google') && !src.includes('analytics')) {
                    status.textContent = `⚡ Fetching JS ${++jsCount}/${scriptElements.length}...`;
                    const jsContent = await fetchResource(jsUrl);
                    
                    if (jsContent) {
                        const newScript = doc.createElement('script');
                        newScript.setAttribute('data-original-src', src);
                        newScript.textContent = `\n/* Embedded from: ${src} */\n${jsContent}\n`;
                        
                        // Copy attributes except src
                        for (let attr of script.attributes) {
                            if (attr.name !== 'src') {
                                newScript.setAttribute(attr.name, attr.value);
                            }
                        }
                        
                        script.parentNode.replaceChild(newScript, script);
                    }
                }
            }

            // Embed images as base64
            const imgElements = Array.from(doc.querySelectorAll('img[src]'));
            let imgCount = 0;
            
            for (let img of imgElements) {
                const src = img.getAttribute('src');
                const imgUrl = resolveUrl(src);
                
                if (imgUrl) {
                    status.textContent = `🖼️ Fetching Image ${++imgCount}/${imgElements.length}...`;
                    const base64Data = await fetchImageAsBase64(imgUrl);
                    
                    if (base64Data) {
                        img.setAttribute('src', base64Data);
                        img.setAttribute('data-original-src', src);
                    }
                }
            }

            // Embed background images in style attributes
            const elementsWithBgImage = Array.from(doc.querySelectorAll('[style*="background"]'));
            let bgCount = 0;
            
            for (let elem of elementsWithBgImage) {
                const style = elem.getAttribute('style');
                if (style && style.includes('url(')) {
                    const urlMatches = style.match(/url\(['"]?([^'")\s]+)['"]?\)/g);
                    
                    if (urlMatches) {
                        let newStyle = style;
                        
                        for (let urlMatch of urlMatches) {
                            const url = urlMatch.match(/url\(['"]?([^'")\s]+)['"]?\)/)[1];
                            const fullUrl = resolveUrl(url);
                            
                            if (fullUrl && !url.startsWith('data:')) {
                                status.textContent = `🎨 Fetching BG ${++bgCount}...`;
                                const base64Data = await fetchImageAsBase64(fullUrl);
                                
                                if (base64Data) {
                                    newStyle = newStyle.replace(url, base64Data);
                                }
                            }
                        }
                        
                        elem.setAttribute('style', newStyle);
                    }
                }
            }

            status.textContent = `✓ Embedded ${cssCount} CSS, ${jsCount} JS, ${imgCount} images, ${bgCount} backgrounds`;
            
            return '<!DOCTYPE html>\n' + doc.documentElement.outerHTML;
        }

        async function processAndDisplay(html, type) {
            let content = '';
            let title = '';

            switch(type) {
                case 'full':
                    status.textContent = `⚡ Processing external resources...`;
                    content = await embedExternalResources(html, currentUrl);
                    embeddedHtmlContent = content;
                    title = 'Full HTML (CSS/JS/Images Embedded)';
                    break;
                
                case 'html':
                    content = html.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
                               .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');
                    title = 'HTML (Without CSS/JS)';
                    break;
                
                case 'css':
                    const styleMatches = html.match(/<style[^>]*>([\s\S]*?)<\/style>/gi);
                    const linkMatches = html.match(/<link[^>]*rel=["']stylesheet["'][^>]*>/gi);
                    content = '';
                    if (styleMatches) {
                        styleMatches.forEach(match => {
                            content += match.replace(/<\/?style[^>]*>/gi, '') + '\n\n';
                        });
                    }
                    if (linkMatches) {
                        content += '\n/* External Stylesheets Found */\n' + linkMatches.join('\n');
                    }
                    if (!content) content = '/* No CSS found in this page */';
                    title = 'CSS Extracted';
                    break;
                
                case 'js':
                    const scriptMatches = html.match(/<script[^>]*>([\s\S]*?)<\/script>/gi);
                    const scriptSrcMatches = html.match(/<script[^>]*src=["'][^"']*["'][^>]*>/gi);
                    content = '';
                    if (scriptMatches) {
                        scriptMatches.forEach(match => {
                            const code = match.replace(/<\/?script[^>]*>/gi, '');
                            if (code.trim()) {
                                content += code + '\n\n/* ========== */\n\n';
                            }
                        });
                    }
                    if (scriptSrcMatches) {
                        content += '\n/* External Scripts Found */\n' + scriptSrcMatches.join('\n');
                    }
                    if (!content) content = '// No JavaScript found in this page';
                    title = 'JavaScript Extracted';
                    break;
                
                case 'text':
                    const tempDiv = document.createElement('div');
                    tempDiv.innerHTML = html;
                    const scripts = tempDiv.getElementsByTagName('script');
                    const styles = tempDiv.getElementsByTagName('style');
                    for (let i = scripts.length - 1; i >= 0; i--) {
                        scripts[i].remove();
                    }
                    for (let i = styles.length - 1; i >= 0; i--) {
                        styles[i].remove();
                    }
                    content = tempDiv.textContent || tempDiv.innerText || '';
                    content = content.replace(/\n\s*\n\s*\n/g, '\n\n').trim();
                    title = 'Text Content Only';
                    break;
                
                case 'raw':
                    content = html;
                    title = 'Raw Source (Unprocessed)';
                    break;
            }

            showCode(content, title);
        }

        function showLoading() {
            output.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Extracting source code...</p>
                </div>
            `;
        }

        function showCode(code, title) {
            const escaped = code
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');

            const lines = code.split('\n').length;
            const size = (new Blob([code]).size / 1024).toFixed(2);

            output.innerHTML = `
                <div class="code-header">
                    <span class="code-title">${title}</span>
                    <div class="header-buttons">
                        <button class="copy-btn-top" onclick="copyToClipboard()">📋 Copy</button>
                        <button class="download-btn" onclick="downloadFile()">💾 Download</button>
                    </div>
                </div>
                <div class="code-container">
                    <pre>${escaped}</pre>
                </div>
                <div class="stats">
                    <div class="stat">
                        <span class="stat-value">${size} KB</span>
                        <span class="stat-label">File Size</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value">${lines}</span>
                        <span class="stat-label">Lines</span>
                    </div>
                    <div class="stat">
                        <span class="stat-value">${code.length.toLocaleString()}</span>
                        <span class="stat-label">Characters</span>
                    </div>
                </div>
            `;
            
            window.currentCode = code;
        }

        function showError(message) {
            output.innerHTML = `<div class="error">⚠️ ${message}</div>`;
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(window.currentCode).then(() => {
                const btn = document.querySelector('.copy-btn-top');
                const originalText = btn.innerHTML;
                btn.innerHTML = '✓ Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('copied');
                }, 2000);
            });
        }

        function downloadFile() {
            let filename = 'extracted';
            let extension = '.txt';
            
            switch(currentType) {
                case 'full':
                case 'html':
                case 'raw':
                    extension = '.html';
                    filename = 'page';
                    break;
                case 'css':
                    extension = '.css';
                    filename = 'styles';
                    break;
                case 'js':
                    extension = '.js';
                    filename = 'scripts';
                    break;
                case 'text':
                    extension = '.txt';
                    filename = 'content';
                    break;
            }

            const blob = new Blob([window.currentCode], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + extension;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            const btn = document.querySelector('.download-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '✓ Downloaded!';
            btn.classList.add('downloaded');
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.classList.remove('downloaded');
            }, 2000);
        }
    </script>
</body>
</html>
